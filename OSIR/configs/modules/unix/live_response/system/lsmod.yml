metadata:
  version: "2.0"
  author: Kelly Brazil
  description: Kelly Brazil - JsonConverter - Parsing the output of the command lsmod
  os: unix

configuration:
  module: lsmod
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: unix

tool: 
  path: cat
  cmd: "{input_file} | jc --lsmod | jq -c '.[]' > {output_file}"

input:
  type: file
  paths: 
    - r"lsmod\.txt$"

output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/system"
  output_file: "{endpoint_name}--{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:live_response:system:lsblk':
    name_rex: lsmod.*\.jsonl$
    path_suffix: lsmod
    sourcetype: 'linux:live_response:system:lsblk'
    host_rex: _([\w\.-]+)--
    artifact: lsblk