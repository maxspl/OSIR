metadata:
  version: "2.0"
  author: Kelly Brazil
  description: Kelly Brazil - JsonConverter - Parsing the output of the command sysctl
    -a
  os: unix

configuration:
  module: sysctl
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: unix

tool: 
  path: cat
  cmd: "{input_file} | jc --sysctl > {output_file}"

input:
  type: file
  paths:
    - r"sysctl\.txt$"
    - r"sysctl_-a\.txt$"

output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/system"
  output_file: "{endpoint_name}--{module}-{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/Endpoint_(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:live_response:sysctl':
    name_rex: sysctl.*\.jsonl$
    path_suffix: system
    sourcetype: _json
    host_rex: ([\w\.-]+)--
    artifact: sysctl