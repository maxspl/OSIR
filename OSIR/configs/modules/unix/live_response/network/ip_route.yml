metadata:
  version: "2.0"
  author: Kelly Brazil
  description: Kelly Brazil - JsonConverter - Parsing the output of the command ip
    route
  os: unix

configuration:
  module: ip_route
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: unix

tool: 
  path: cat
  cmd: "{input_file} | jc --ip-route | jq -c '.[]' > {output_file}"

input:
  type: file
  paths:
    - r"ip_route\.txt$"

output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/network"
  output_file: "{endpoint_name}--{module}-{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/Endpoint_(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:live_response:network:ip_route':
    name_rex: ip_route.*\.jsonl$
    path_suffix: network
    sourcetype: 'linux:live_response:network:ip_route'
    host_rex: ([\w\.-]+)--
    artifact: ip_route