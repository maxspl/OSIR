metadata:
  version: "2.0"
  author: Kelly Brazil
  description: Kelly Brazil - JsonConverter - Parsing the output of the command top
    and top -b
  os: unix

configuration:
  module: top
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: unix

tool: 
  path: cat
  cmd: "{input_file} | jc --top | jq -c '.[]' > {output_file}"

input:
  type: file
  paths:
    - r"top_-b\.txt$"

output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/process"
  output_file: "{endpoint_name}--{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:live_response:top':
    name_rex: \.jsonl$
    path_suffix: top
    sourcetype: 'linux:live_response:top'
    host_rex: _([\w\.-]+)--
    timestamp_path: 
        - "time"
    timestamp_format: "%H:%M:%S"
    artifact: top