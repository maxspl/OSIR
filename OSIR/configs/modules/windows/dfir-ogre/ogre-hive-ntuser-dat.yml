metadata:
  version: "1.0"
  author: maxspl
  description: Parsing of reg_keys - using ANSSI DFIR OGRE
  os: windows

configuration:
  module: ogre-hive-ntuser-dat
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
    - external
  processor_os: unix

tool: 
  path: /app/ogre-venv/bin/dfir-ogre
  cmd: >-
    plugin
    --filename "{input_file}"
    --computer_name "{endpoint_name}"
    --output_folder "{output_dir}"
    --plugin_config "/ogre/dfir-ogre-plugin-windows/configuration/hive.xml"
    --output_format jsonl
    --output_date_format iso_utc
    --params '{"root_name": "\\\\HKU"}'
  source: https://github.com/ANSSI-FR/dfir-ogre
  version: 2.0.0-beta1

input:
  type: file
  paths:
    - r"(?i).*/NTUSER\.DAT$"
    
output:
  type: multiple_files
  format: jsonl
  output_prefix: "{endpoint_name}--{user_name}--{module}-"

endpoint: 
  patterns:
    - r"restore_fs\/(.*?)\/"
    - r"\/Endpoint_(.*?)\/"
  default: "UNKNOWN"

user: 
  patterns:
    - r"Users\/([^\/]+)"
  default: "UNKNOWN"
  
splunk:
  'windows:ogre:hive_ntuser_dat':
    name_rex: '\.jsonl$'
    path_suffix: 'ogre-hive-ntuser-dat'
    sourcetype: 'windows:ogre:hive_ntuser_dat'
    host_rex: ([\w\.-]+?)--
    artifact: "hive"
    timestamp_path:
      - "mtime" 
    timestamp_format: "%Y-%m-%dT%H:%M:%S.%f%z"
