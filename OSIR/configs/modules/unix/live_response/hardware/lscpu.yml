version: 1.0
author: Kelly Brazil
module: lscpu
description: Kelly Brazil - JsonConverter - Parsing the output of the command lscpu
os: unix
type: process
requirements:
disk_only: false
no_multithread: false
processor_type: 
  - external
processor_os: unix
tool: 
  path: cat
  cmd: "{input_file} | jc --kv | jq -c '.[]' > {output_file}"
input:
  type: file
  paths: 
    - r"lscpu.txt$"
output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/hardware"
  output_file: "{endpoint_name}--{module}-{input_file}.jsonl"
endpoint: "extract_uac\/(.*?)\/"
splunk:
  'linux:live_response:hardware:lscpu':
    name_rex: lscpu.*\.jsonl$
    sourcetype: 'linux:live_response:hardware:lscpu'
    host_rex: "\/Endpoint_(.*?)\/"
    timestamp_path: 
        - "_time"
    timestamp_format: "%Y-%m-%d %H:%M:%S"
    artifact: lscpu