metadata:
  version: "2.0"
  author: maxspl
  description: Parsing of ShimCache artifact.
  os: windows

configuration:
  module: shimcache
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: windows

tool: 
  path: net9/AppCompatCacheParser.exe
  cmd: -f "{input_file}" --csv "{output_dir}" --csvf "{output_file}"
  source: https://ericzimmerman.github.io/
  version: 1.5.1

input:
  type: file
  name: SYSTEM$
  path: Windows/System32/config

output:
  type: single_file
  format: csv
  output_file: "{endpoint_name}--{module}-{input_file}.csv"

endpoint: 
  patterns:
    - r"restore_fs\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'windows:shimcache':
    name_rex: \.csv$
    path_suffix: 'shimcache'
    sourcetype: 'windows:registry:hklm:shimcache'
    host_rex: ([\w\.-]+)--
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    artifact: "ShimCache"
    normalize:
      - ecs_normalize/windows/shimcache.vrl    