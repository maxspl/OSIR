metadata:
  version: "2.0"
  author: maxspl
  description: Parse Listdlls.txt from DFIR ORC (Listdlls.exe command)
  os: windows

configuration:
  module: win_listdlls
  alt_module: live_response_dispatcher
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - internal
  processor_os: unix

input:
  type: file
  paths: 
    - "**/extracted_files/General/Listdlls.txt"
    - r"listdlls_.*\.txt$"

output:
  type: single_file
  format: jsonl
  output_file: "{endpoint_name}--{module}.jsonl"

endpoint: 
  patterns:
    - r"/Endpoint_(.*?)/"
  default: "UNKNOWN"

optional:
  parser: listdlls

splunk:
  'windows:live_response:dll':
    name_rex: --win_listdlls\.jsonl$
    path_suffix: win_listdlls 
    host_rex: ([\w\.-]+)--
    artifact: "DLL"
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    normalize:
      - ecs_normalize/windows/live_response/listdlls.vrl      