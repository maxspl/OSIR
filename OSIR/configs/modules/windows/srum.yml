metadata:
  version: "2.0"
  author: maxspl
  description: Parsing of SRUM artifact.
  os: windows

configuration:
  module: srum
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: unix

tool: 
  path: artemis
  cmd: acquire --format JSONL --output-dir {output_dir} srum --alt-file {input_file}
  source: https://github.com/maxspl/artemis
  version: 1.1

input:
  type: file
  name: SRUDB\.dat
  path: Windows/System32/sru

output:
  type: multiple_files
  format: csv
  output_prefix: "{endpoint_name}--{module}-"

endpoint: 
  patterns:
    - r"restore_fs\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'windows:srum':
    name_rex: --srum-.*\.jsonl$
    sourcetype: 'windows:files:srum'
    host_rex: ([\w\.-]+)--
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    artifact: "SRUM"
    normalize:
      - ecs_normalize/windows/srum.vrl
    encoding: utf8        