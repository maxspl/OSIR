metadata:
  version: "2.0"
  author: Typ
  description: Scan of collected UAC (output of extract_uac module) files using Thor
    (requires Forensic license).
  os: generic
configuration:
  module: thor_uac
  type: process
  disk_only: false
  no_multithread: true
  processor_type:
  - external
  processor_os: unix

tool: 
  path: thor/thor-linux-64
  cmd: --lab --nocsv --silent --nolog -p {input_dir} --jsonfile {output_file}
  source: https://www.nextron-systems.com/thor/
  version: 1.0

input:
  type: dir
  path: r"extract_uac\/[^\/]+\/extracted_files$"

output:
  type: single_file
  format: json
  output_file: "{endpoint_name}--{module}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/Endpoint_(.*?)\/"
  default: "UNKNOWN"

splunk:
  'thor:files':
    name_rex: \.jsonl$
    path_suffix: 'thor_uac'
    sourcetype: 'thor:files'
    host_rex: ([\w\.-]+)--
    timestamp_path: 
        - "time"
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    artifact: "Thor"
