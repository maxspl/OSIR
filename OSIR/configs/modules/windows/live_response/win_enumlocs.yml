metadata:
  version: "2.0"
  author: maxspl
  description: Parse Enumlocs.txt from DFIR ORC
  os: windows

configuration:
  module: win_enumlocs
  alt_module: live_response_dispatcher
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - internal
  processor_os: unix

input:
  type: file
  paths: 
    - "**/extracted_files/General/Enumlocs.txt"
    - r"enumlocs_.*\.txt$"

output:
  type: single_file
  format: jsonl
  output_file: "{endpoint_name}--{module}.jsonl"

endpoint: 
  patterns:
    - r"/Endpoint_(.*?)/"
  default: "UNKNOWN"

optional:
  parser: enumlocs