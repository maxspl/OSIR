version: 1.1
author: Kelly Brazil
module: iptables
description: Kelly Brazil - JsonConverter - Parsing the output of the command iptables 
os: unix
type: process
requirements:
disk_only: false
no_multithread: false
processor_type: 
  - external
processor_os: unix
tool: 
  path: cat
  cmd: "{input_file} | jc --iptables | jq -c '.[]' > {output_file}"
input:
  type: file
  paths:
    - r"iptables\.txt$"
output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/network"
  output_file: "{endpoint_name}--{input_file}.jsonl"
endpoint: "extract_uac\/(.*?)\/"
splunk:
  'linux:live_response:network:iptables':
    name_rex: \.jsonl$
    path_suffix: iptables
    sourcetype: 'linux:live_response:network:iptables'
    host_rex: _([\w\.-]+)--
    artifact: iptables