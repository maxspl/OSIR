metadata:
  version: "2.0"
  author: Kelly Brazil
  description: Kelly Brazil - JsonConverter - Parsing the output of the command findmnt
  os: unix

configuration:
  module: findmnt
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: unix

tool: 
  path: cat
  cmd: "{input_file} | jc --findmnt | jq -c '.[]' > {output_file}"

input:
  type: file
  paths:
    - r"findmnt.txt$"

output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/system" 
  output_file: "{endpoint_name}--{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:live_response:storage:findmnt':
    name_rex: \.jsonl$
    path_suffix: findmnt
    sourcetype: 'linux:live_response:storage:findmnt'
    host_rex: _([\w\.-]+)--
    artifact: findmnt