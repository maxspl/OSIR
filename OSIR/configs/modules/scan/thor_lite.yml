metadata:
  version: "2.0"
  author: Typ
  description: Scan of collected file using Thor Lite.
  os: generic

configuration:
  module: thor_lite
  type: process
  disk_only: false
  no_multithread: true
  processor_type:
  - external
  processor_os: unix

tool: 
  path: thor-lite/thor-lite-linux-64
  cmd: -a Filescan --intense --norescontrol --cross-platform -p {input_dir} --nocsv --silent --nolog --jsonfile {output_file} 
  source: https://www.nextron-systems.com/thor-lite/
  version: 1.0

input:
  type: dir
  path: extracted_files

output:
  type: single_file
  format: json
  output_file: "{endpoint_name}--{module}.jsonl"

endpoint: 
  patterns:
    - r"/Endpoint_(.*?)/"
  default: "UNKNOWN"

splunk:
  'thor:files':
    name_rex: \.jsonl$
    path_suffix: 'thor_lite'
    sourcetype: 'thor:files'
    host_rex: ([\w\.-]+)--
    timestamp_path: 
        - "time"
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    artifact: "Thor"