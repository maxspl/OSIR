metadata:
  version: "2.0"
  author: Typ
  description: Parse user infos from UAC [root] using Dissect plugin
  os: unix

configuration:
  module: user_details
  alt_module: dissect_dispatcher
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - internal
  processor_os: unix

input:
  type: dir
  paths:
    - r"extract_uac.*\/\[root\]$"

output:
  type: single_file
  format: jsonl
  output_file: "{endpoint_name}--{module}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/Endpoint_(.*?)\/"
  default: "UNKNOWN"

optional:
  plugin: user_details

splunk:
  'linux:user_details':
    name_rex: \.jsonl$
    sourcetype: 'linux:user_details'
    host_rex: ([\w\.-]+)--
    timestamp_path: 
        - "ts"
    timestamp_format: "%Y-%m-%dT%H:%M:%S.%f%z"
    artifact: "user_details"