metadata:
  version: "2.0"
  author: Typ
  description: Parsing logs from '/var/log/dpkg'
  os: unix

configuration:
  module: dpkg
  type: process
  disk_only: true
  no_multithread: true
  processor_type:
  - internal
  processor_os: unix

input:
  type: file
  name: (?:dpkg)
  path: var/log

output:
  type: single_file
  format: json
  output_file: "{endpoint_name}--{module}-{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:dpkg':
    name_rex: dpkg.*\.jsonl$
    sourcetype: 'linux:dpkg'
    host_rex: "\/Endpoint_(.*?)\/"
    timestamp_path: 
        - "_time"
    timestamp_format: "%Y-%m-%d %H:%M:%S"
    artifact: "dpkg"