version: 1.1
author: Kelly Brazil
module: lsblk
description: Kelly Brazil - JsonConverter - Parsing the output of the command lsblk
os: unix
type: process
requirements:
disk_only: false
no_multithread: false
processor_type: 
  - external
processor_os: unix
tool: 
  path: cat
  cmd: "{input_file} | jc --lsblk | jq -c '.[]' > {output_file}"
input:
  type: file
  paths:
    - r"lsblk\.txt$"
output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/storage"
  output_file: "{endpoint_name}--{input_file}.jsonl"
endpoint: "extract_uac\/(.*?)\/"
splunk:
  'linux:live_response:lsblk':
    name_rex: \.jsonl$
    path_suffix: lsblk
    sourcetype: 'linux:live_response:lsblk'
    host_rex: _([\w\.-]+)--
    artifact: lsblk