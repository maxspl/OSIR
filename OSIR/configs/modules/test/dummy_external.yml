metadata:
  version: "2.0"
  author: maxspl
  description: Dummy module to test WSL / Powershell connexion
  os: windows

configuration:
  module: dummy_external
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: windows

tool: 
  path: net9/AmcacheParser.exe
  cmd: -f "{input_file}" --csv "{output_dir}" --csvf "{output_file}"
  source:
  version: 

input:
  type: file
  name: Amcache\.hve$
  path: Windows/AppCompat/Programs

output:
  type: single_file
  format: csv
  output_file: "{endpoint_name}--{module}-{input_file}.csv"

endpoint: 
  patterns:
    - r"/Endpoint_(.*?)/"
  default: "UNKNOWN"
