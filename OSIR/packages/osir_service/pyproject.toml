[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "osir-service"
version = "0.1.0"
description = "OSIR Python package"
readme = "README.md"
requires-python = ">=3.8"
authors = [
    { name="Maxspl/Typ", email="your@email.com" }
]

[project.urls]
Homepage = "https://github.com/maxspl/OSIR"

[tool.setuptools.packages.find]
where = ["./"]