metadata:
  version: "2.0"
  author: maxspl
  description: Parsing of EVTX collected by DFIR ORC or in the filesystem
  os: windows

configuration:
  module: evtx
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: unix

tool: 
  path: evtx_dump
  cmd: -f {output_file} -o jsonl {input_file} --no-confirm-overwrite
  source: https://github.com/omerbenamram/evtx/releases
  version: 0.11.2

input:
  type: file
  paths:
    - r"_[\w%-]+\.evtx_{"
    - r"\.evtx$"

output:
  type: single_file
  format: jsonl
  output_file: "{endpoint_name}--{module}-{input_file}.jsonl"

endpoint: 
  patterns:
    - r"restore_fs\/(.*?)\/"
    - r"\/Endpoint_(.*?)\/"
  default: "UNKNOWN"

splunk:
  'windows:evtx:system':
    name_rex: System\.evtx.*\.jsonl$
    path_suffix: 'evtx'
    sourcetype: 'windows:evtx:system'
    host_rex: ([\w\.-]+)--
    artifact: "EVTX"
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    normalize:
      - ecs_normalize/windows/evtx.vrl

  'windows:evtx:sysmon':
    name_rex: Sysmon.*\.evtx.*\.jsonl$
    path_suffix: 'evtx'
    sourcetype: 'windows:evtx:sysmon'
    host_rex: ([\w\.-]+)--
    artifact: "EVTX"
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    normalize:
      - ecs_normalize/windows/evtx.vrl

  'windows:evtx:security':
    name_rex: Security\.evtx.*\.jsonl$
    path_suffix: 'evtx'
    sourcetype: 'windows:evtx:security'
    host_rex: ([\w\.-]+)--
    artifact: "EVTX"
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    normalize:
      - ecs_normalize/windows/evtx.vrl

  'windows:evtx:powershell:operational':
    name_rex: PowerShell.*Operational\.evtx.*\.jsonl$
    path_suffix: 'evtx'
    sourcetype: 'windows:evtx:powershell:operational'
    host_rex: ([\w\.-]+)--
    artifact: "EVTX"
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    normalize:
      - ecs_normalize/windows/evtx.vrl

  'windows:evtx:powershell':
    name_rex: PowerShell\.evtx.*\.jsonl$
    path_suffix: 'evtx'
    sourcetype: 'windows:evtx:powershell'
    host_rex: ([\w\.-]+)--
    artifact: "EVTX"
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    normalize:
      - ecs_normalize/windows/evtx.vrl

  'windows:evtx':
    name_rex: \.evtx.*\.jsonl$
    path_suffix: 'evtx'
    sourcetype: 'windows:evtx'
    host_rex: ([\w\.-]+)--
    artifact: "EVTX"
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    normalize:
      - ecs_normalize/windows/evtx.vrl
