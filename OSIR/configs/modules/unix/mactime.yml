metadata:
  version: "2.0"
  author: Typ
  description: Parsing logs from '/bodyfile' in UAC collect
  os: unix

configuration:
  module: mactime
  type: process
  disk_only: true
  no_multithread: true
  processor_type:
  - external
  processor_os: unix

tool: 
  path: mactime
  cmd: "-b {input_file} -d -y  > {output_file}"

input:
  type: file
  paths: 
    - "bodyfile/*.txt"
    - "**/bodyfile/*.txt"
    - r"\/bodyfile\.txt$"

output:
  type: single_file
  format: csv
  output_file: "{endpoint_name}--{module}-{input_file}.csv"

endpoint: 
  patterns:
    - r"extract_uac\/Endpoint_(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:files:bodyfile':
    name_rex: bodyfile.*\.csv$
    sourcetype: 'linux:files:bodyfile'
    host_rex: ([\w\.-]+)--
    timestamp_path: 
        - "timestamp"
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    artifact: "bodyfile"
    normalize:
      - transform/linux/mactime.vrl