version: 1.1
author: Kelly Brazil
module: env
description: Kelly Brazil - JsonConverter - Parsing the output of the command env
os: unix
type: process
requirements:
disk_only: false
no_multithread: false
processor_type: 
  - external
processor_os: unix
tool: 
  path: cat
  cmd: "{input_file} | jc --env | jq -c '.[]' > {output_file}"
input:
  type: file
  paths:
    - r"/env.txt$"
output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/system" 
  output_file: "{endpoint_name}--{input_file}.jsonl"
endpoint: "extract_uac\/(.*?)\/"
splunk:
  'linux:live_response:system:env':
    name_rex: env.*\.jsonl$
    path_suffix: env
    sourcetype: 'linux:live_response:system:env'
    host_rex: _([\w\.-]+)--
    artifact: env