metadata:
  version: "1.0"
  author: maxspl
  description: Parsing of scheduled_tasks - using ANSSI DFIR OGRE
  os: windows

configuration:
  module: ogre-registry-scheduled-task
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
    - external
  processor_os: unix

tool: 
  path: /app/ogre-venv/bin/dfir-ogre
  cmd: >-
    plugin
    --filename "{input_file}"
    --computer_name "{endpoint_name}"
    --output_folder "{output_dir}"
    --plugin_config "/ogre/dfir-ogre-plugin-windows/configuration/registry/scheduled_task.xml"
    --output_format jsonl
    --output_date_format iso_utc
  source: https://github.com/ANSSI-FR/dfir-ogre
  version: 2.0.0-beta1

input:
  type: file
  paths:
    - r".*/SOFTWARE$"

output:
  type: multiple_files
  format: jsonl
  output_prefix: "{endpoint_name}--{module}-"

endpoint: 
  patterns:
    - r"restore_fs\/(.*?)\/"
    - r"\/Endpoint_(.*?)\/"
  default: "UNKNOWN"

splunk:
  'windows:ogre:registry_scheduled_task':
    name_rex: '\.jsonl$'
    path_suffix: 'ogre-registry-scheduled-task'
    sourcetype: 'windows:ogre:registry_scheduled_task'
    host_rex: ([\w\.-]+)--
    artifact: "hive"
    timestamp_path:
      - "creation_date" 
    timestamp_format: "%Y-%m-%dT%H:%M:%S.%f%z"
