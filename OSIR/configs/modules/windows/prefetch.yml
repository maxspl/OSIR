metadata:
  version: "2.0"
  author: Eric Zimmerman
  description: Eric Zimmerman - PECmd.exe
  os: windows

configuration:
  module: prefetch
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: windows

tool: 
  path: net9/PECmd.exe
  cmd: -d "{input_dir}" --json "{output_dir}" --jsonf "{output_file}" -q
  source: https://ericzimmerman.github.io/
  version: 1.5.1

input:
  type: dir
  path: Windows/Prefetch

output:
  type: single_file
  format: json
  output_file: "{endpoint_name}--{module}.jsonl"

endpoint: 
  patterns:
    - r"restore_fs\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'windows:prefetch':
    name_rex: \.jsonl$
    path_suffix: 'prefetch'
    sourcetype: 'windows:files:prefetch'
    host_rex: ([\w\.-]+)--
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    artifact: "Prefetch"
    normalize:
      - ecs_normalize/windows/prefetch.vrl