metadata:
  version: "2.0"
  author: maxspl
  description: Parse ConsoleHost_history.txt
  os: windows

configuration:
  module: powershell_history
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - internal
  processor_os: unix

input:
  type: file
  name: ConsoleHost_history.txt
  path: AppData/Roaming/Microsoft/Windows/PowerShell/PSReadLine/

output:
  type: single_file
  format: jsonl
  output_file: "{endpoint_name}--{module}-username_changed_by_parser.jsonl"

endpoint: 
  patterns:
    - r"restore_fs\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'windows:powershell_history':
    name_rex: \.jsonl$
    path_suffix: powershell_history
    host_rex: ([\w\.-]+)--
    artifact: "POWERSHELL"
    normalize:
      - ecs_normalize/windows/powershell_history.vrl   