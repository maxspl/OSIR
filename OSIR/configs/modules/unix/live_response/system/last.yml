version: 1.1
author: Kelly Brazil
module: last
description: Kelly Brazil - JsonConverter - Parsing the output of the command last and lastb 
os: unix
type: process
requirements:
disk_only: false
no_multithread: false
processor_type: 
  - external
processor_os: unix
tool: 
  path: cat
  cmd: "{input_file} | jc --last | jq -c '.[]' > {output_file}"
input:
  type: file
  paths:
    - r"last\.txt$"
    - r"lastb\.txt$"
output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/system"
  output_file: "{endpoint_name}--{input_file}.jsonl"
endpoint: "extract_uac\/(.*?)\/"
splunk:
  'linux:live_response:system:last':
    name_rex: \.jsonl$
    path_suffix: last
    sourcetype: 'linux:live_response:system:last'
    host_rex: _([\w\.-]+)--
    timestamp_path: 
        - "login"
    timestamp_format: "%a %b %d %H:%M"
    artifact: last