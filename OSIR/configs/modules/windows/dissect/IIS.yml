metadata:
  version: "2.0"
  author: maxspl
  description: Parse IIS from DFIR ORC restore_fs using Dissect plugin
  os: windows

configuration:
  module: IIS
  alt_module: dissect_dispatcher
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - internal
  processor_os: unix

input:
  type: dir
  path: r"restore_fs\/[^\/]*$"

output:
  type: single_file
  format: jsonl
  output_file: "{endpoint_name}--{module}.jsonl"

endpoint: 
  patterns:
    - r"restore_fs\/(.*?)$"
  default: "UNKNOWN"

optional:
  plugin: iis

splunk:
  'windows:iis':
    name_rex: --IIS\.jsonl$
    host_rex: ([\w\.-]+)--
    path_suffix: IIS
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    artifact: "IIS"
    normalize:
      - ecs_normalize/windows/iis.vrl    
      
