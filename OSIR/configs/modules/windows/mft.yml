version: 1.0
author: Typ
module: mft
description: Parsing of $MFT artifact.
os: windows
type: process
disk_only: False
no_multithread: False
processor_type: 
  - external
processor_os: windows
tool: 
  path: net9/MFTECmd.exe
  cmd: -f '{input_file}' --csv '{output_dir}' --csvf '{output_file}'
  source: https://ericzimmerman.github.io/
  version: 1.3
input:
  type: file
  paths: 
    - r"\$MFT$"
    - r"\$J$"
output:
  type: single_file
  format: csv
  output_file: "{endpoint_name}--{input_file}-{module}.csv"
endpoint: "/Endpoint_(.*?)/"
splunk:
  'filesystem:ntfs:info':
    name_rex: \$MFT.*\.csv$
    sourcetype: 'filesystem:ntfs:info'
    host_rex: ([\w\.-]+)--
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%d %H:%M:%S%.f"
    artifact: "mft"
    normalize:
      - ecs_normalize/windows/mft.vrl
  'filesystem:ntfs:usn':
    name_rex: \$J.*.csv$
    sourcetype: 'filesystem:ntfs:usn'
    host_rex: ([\w\.-]+)--
    timestamp_path: 
        - "timestamp"
    timestamp_format: "%Y-%m-%d %H:%M:%S.%f"
    normalize:
      - ecs_normalize/windows/usn.vrl