metadata:
  version: "2.0"
  author: Kelly Brazil
  description: Kelly Brazil - JsonConverter - Parsing the output of the command df
    and df -h
  os: unix

configuration:
  module: df
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: unix

tool: 
  path: cat
  cmd: "{input_file} | jc --df | jq -c '.[]' > {output_file}"

input:
  type: file
  paths:
    - r"df\.txt$"
    - r"df_-h.txt$"

output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/storage"
  output_file: "{endpoint_name}--{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:live_response:storage:df':
    name_rex: \.jsonl$
    path_suffix: df
    sourcetype: 'linux:live_response:storage:df'
    host_rex: _([\w\.-]+)--
    artificat: df