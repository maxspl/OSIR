metadata:
  version: "3.0"
  author: maxspl
  description: Parsing web access logs
  os: unix

configuration:
  module: web_access
  type: process
  disk_only: true
  no_multithread: true
  processor_type:
  - external
  processor_os: unix

tool: 
  path: TurboLP
  cmd: run --module web-access --input "{input_file}" --output "{output_file}" --prefix-input-hash
input:
  type: file
  paths:
    - r"var\/log\/apache2"
    - r"access.*log"

output:
  type: single_file
  format: json
  output_file: "{endpoint_name}--{module}-{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:web_access':
    name_rex: \.jsonl$
    sourcetype: 'linux:web_access'
    host_rex: ([\w\.-]+)--
    timestamp_path: 
    - "ts"
    timestamp_format: "%Y-%m-%dT%H:%M:%S.%f%z"
    artifact: "web_access"

