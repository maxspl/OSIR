version: 1.0
author: Typ
module: authlog
alt_module: dissect_dispatcher
description: Parse auth log from UAC [root] using Dissect plugin
os: windows
type: process
disk_only: False
no_multithread: False
processor_type: 
  - internal
processor_os: unix
input:
  type: dir
  paths:
    - r"extract_uac.*\/\[root\]$"
output:
  type: single_file
  format: jsonl
  output_file: "{endpoint_name}--{module}.jsonl"
endpoint: "extract_uac\/Endpoint_(.*?)\/"
optional:
  plugin: authlog