version: 1.0
author: maxspl
module: win_bits
alt_module: live_response_dispatcher
description: Parse BITS_jobs.txt from DFIR ORC (bitsadmin.exe /list /allusers /verbose command)
os: windows
type: process
disk_only: False
no_multithread: False
processor_type: 
  - internal
processor_os: unix
input:
  type: file
  paths: 
    - "**/extracted_files/General/BITS_jobs.txt"
    - r"bitsjobs_.*\.txt$" 
output:
  type: single_file
  format: jsonl
  output_file: "{endpoint_name}--{module}.jsonl"
endpoint: "/Endpoint_(.*?)/"
optional:
  parser: bits_jobs
splunk:
  'windows:live_response:bits':
    name_rex: --win_bits\.jsonl$
    path_suffix: win_bits
    host_rex: ([\w\.-]+)--
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    artifact: "BITS"
    normalize:
      - ecs_normalize/windows/live_response/bits.vrl 