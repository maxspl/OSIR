version: 1.0
author: maxspl
module: win_routes
alt_module: live_response_dispatcher
description: Parse routes.txt from DFIR ORC (route.exe PRINT command)
os: windows
type: process
disk_only: False
no_multithread: False
processor_type: 
  - internal
processor_os: unix
input:
  type: file
  name: routes.txt
  path: extracted_files/General/
output:
  type: single_file
  format: jsonl
  output_file: "{endpoint_name}--{module}.jsonl"
endpoint: "/Endpoint_(.*?)/"
optional:
  parser: routes
splunk:
  'windows:live_response:routes':
    name_rex: --win_routes\.jsonl$
    path_suffix: win_routes 
    host_rex: ([\w\.-]+)--
    artifact: "ROUTES"
    normalize:
      - ecs_normalize/windows/live_response/routes.vrl     