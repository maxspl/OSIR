metadata:
  version: "2.0"
  author: maxspl
  description: Parsing of registry hives artifact.
  os: windows

configuration:
  module: hives_hklm
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: windows

tool: 
  path: net9/RECmd/RECmd.exe
  cmd: -d "{input_dir}" --csv "{output_dir}" --csvf "{output_file}" --bn "{drive}\OSIR\bin\net9\RECmd\BatchExamples\DFIRBatch.reb" --recover
  source: https://ericzimmerman.github.io/
  version: 2.1

input:
  type: dir
  path: Windows/System32/config

output:
  type: single_file
  format: csv
  output_file: "{endpoint_name}--{module}.csv"

endpoint: 
  patterns:
    - r"restore_fs\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'windows:hklm':
    name_rex: --hives_*\w*\.csv
    path_rex: '.*\/hives_hklm.*'
    sourcetype: 'windows:registry:hklm'
    host_rex: ([\w\.-]+)--
    artifact: "Hives"
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    normalize:
      - ecs_normalize/windows/hives.vrl