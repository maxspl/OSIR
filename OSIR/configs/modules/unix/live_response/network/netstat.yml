version: 1.0
author: Kelly Brazil
module: netstat
description: Kelly Brazil - JsonConverter - Parsing the output of the command netstat 
os: unix
type: process
requirements:
disk_only: false
no_multithread: false
processor_type: 
  - external
processor_os: unix
tool: 
  path: cat
  cmd: "{input_file} | jc --netstat | jq -c '.[]' > {output_file}"
input:
  type: file
  paths:
    - r"netstat_-a\.txt$"
output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/network"
  output_file: "{endpoint_name}--{input_file}.jsonl"
endpoint: "extract_uac\/(.*?)\/"