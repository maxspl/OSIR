metadata:
  version: "1.0"
  author: maxspl
  description: Parsing of systeminfo - using ANSSI DFIR OGRE
  os: windows

configuration:
  module: ogre-system-info
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
    - external
  processor_os: unix

tool: 
  path: /app/ogre-venv/bin/dfir-ogre
  cmd: >-
    plugin
    --filename "{input_file}"
    --computer_name "{endpoint_name}"
    --output_folder "{output_dir}"
    --plugin_config "/ogre/dfir-ogre-plugin-windows/configuration/system_info.xml"
    --output_format jsonl
    --output_date_format iso_utc
  source: https://github.com/ANSSI-FR/dfir-ogre
  version: 2.0.0-beta1

input:
  type: file
  paths:
    - r"(?i)Systeminfo.*csv$"

output:
  type: multiple_files
  format: jsonl
  output_prefix: "{endpoint_name}--{module}-"

endpoint: 
  patterns:
    - r"restore_fs\/(.*?)\/"
    - r"\/Endpoint_(.*?)\/"
  default: "UNKNOWN"

splunk:
  'windows:ogre:system_info':
    name_rex: '\.jsonl$'
    path_suffix: 'ogre-system-info'
    sourcetype: 'windows:ogre:system_info'
    host_rex: ([\w\.-]+)--
    artifact: "system-info"
