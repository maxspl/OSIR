metadata:
  version: "2.0"
  author: maxspl
  description: Parse DNS_records.txt from DFIR ORC (custom ps1 command)
  os: windows

configuration:
  module: win_dns_records
  alt_module: live_response_dispatcher
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - internal
  processor_os: unix

input:
  type: file
  name: DNS_records.txt
  path: extracted_files/Powershell/

output:
  type: single_file
  format: jsonl
  output_file: "{endpoint_name}--{module}.jsonl"

endpoint: 
  patterns:
    - r"/Endpoint_(.*?)/"
  default: "UNKNOWN"

optional:
  parser: dns_records

splunk:
  'windows:live_response:dns_records':
    name_rex: --dns_records\.jsonl$
    path_suffix: dns_records
    host_rex: ([\w\.-]+)--
    artifact: "DNS_RECORDS"
    normalize:
      - ecs_normalize/windows/live_response/dns_records.vrl    