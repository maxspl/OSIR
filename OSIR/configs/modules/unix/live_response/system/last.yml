metadata:
  version: "2.0"
  author: Kelly Brazil
  description: Kelly Brazil - JsonConverter - Parsing the output of the command last
    and lastb
  os: unix

configuration:
  module: last
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: unix

tool: 
  path: cat
  cmd: "{input_file} | jc --last | jq -c '.[]' > {output_file}"

input:
  type: file
  paths:
    - r"last\.txt$"
    - r"lastb\.txt$"

output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/system"
  output_file: "{endpoint_name}--{module}-{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/Endpoint_(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:live_response:system:last':
    name_rex: last.*\.jsonl$
    path_suffix: system
    sourcetype: 'linux:live_response:system:last'
    host_rex: ([\w\.-]+)--
    timestamp_path: 
        - "login"
    timestamp_format: "%a %b %d %H:%M"
    artifact: last