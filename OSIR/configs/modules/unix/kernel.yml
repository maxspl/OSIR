metadata:
  version: "2.0"
  author: Typ
  description: Parsing logs from '/var/log/kernel'
  os: unix

configuration:
  module: kernel
  type: process
  disk_only: true
  no_multithread: true
  processor_type:
  - internal
  processor_os: unix

input:
  type: file
  name: (?:kernel)
  path: var/log/

output:
  type: single_file
  format: json
  output_file: "{endpoint_name}--{module}-{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:kernel':
    name_rex: \.jsonl$
    sourcetype: 'linux:kernel'
    host_rex: ([\w\.-]+)--
    timestamp_path: 
        - "_time"
    timestamp_format: "%s"
    artifact: "kernel"