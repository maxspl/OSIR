metadata:
  version: "1.0"
  author: Typ
  description: windows-eventlog | Osir Transform description to normalize EVTX.

pipeline:
  - name: set_timestamp
  - name: set_action_properties
  - name: set_event
  - name: set_action
  - name: set_mitre
  - name: set_channel
  - name: set_dll
  - name: set_file
  - name: main_stage
  - name: finalize
  - name: dns_fields
  - name: registry
  - name: set_url
  - name: network_type
  - name: hashes
  - name: process_ids
  - name: set_user
  - name: action_target
  - name: set_destination
  - name: del_event
stages:
  set_timestamp:
    actions:
      - set:
          timestamp: v'.Event.System.TimeCreated."#attributes".SystemTime'
  set_action_properties:
    actions:
      - set:
          action.system: v'.Event.System'
          action.properties: v'.Event.EventData'
          action.properties.Attributes: v'.Event.EventData.Attributes'
          action.properties.Requester: v'.Event.EventData.Requester'
          # action.properties.MessEventType: v'.parsed_message_kv.EventType'
          # action.properties.ParentImage: v'.parsed_message_kv.ParentImage'
          # action.properties.StartFunction: v'.parsed_message_kv.StartFunction'
          # action.properties.StartModule: v'.parsed_message_kv.StartModule'
          # action.properties.FailureCode: v'.parsed_message_kv.FailureCode'
          # action.properties.TaskContentNew_Args: v'.parsed_message_xml.Task.Actions.Exec.Arguments'
          # action.properties.TaskContentNew_Command: v'.parsed_message_xml.Task.Actions.Exec.Command'
          action.properties.ContextInfo: v'.Event.EventData.ContextInfo'
          action.properties.CallingStationID: v'.Event.EventData.CallingStationID'
          action.properties.BytesTotal: v'.Event.EventData.bytesTotal'
          action.properties.ConfigurationFile: v'.Event.EventData.Configuration'
          action.properties.FileVersion: v'.Event.EventData.FileVersion'
          action.properties.Product: v'.Event.EventData.FileVersion'
          action.properties.Description: v'.Event.EventData.Description'
          action.properties.ThreatName: v'.Event.EventData.ThreatName'
          action.properties.DetectionUser: v'.Event.EventData.DetectionUser'
          action.properties.HealthAttestationServer: v'.Event.EventData.HealthAttestationServer'
          action.properties.LastASSecurityIntelligenceAge: v'.Event.EventData.LastASSecurityIntelligenceAge'
          action.properties.LastAVSecurityIntelligenceAge: v'.Event.EventData.LastAVSecurityIntelligenceAge'
          action.properties.LastFullScanAge: v'.Event.EventData.LastFullScanAge'
          action.properties.LastQuickScanAge: v'.Event.EventData.LastQuickScanAge'
          action.properties.NewValue: v'.Event.EventData.NewValue'
          action.properties.SentUpdateServer: v'.Event.EventData.SentUpdateServer'
          action.properties.ServiceFileName: v'.Event.EventData.ServiceFileName'
          action.properties.StatusInformation: v'.Event.EventData.StatusInformation'
          action.properties.Subject: v'.Event.EventData.Subject'
          action.properties.TransmittedServices: v'.Event.EventData.TransmittedServices'
      - set:
          action.properties.Image: v'.Event.EventData.Image'
        filter: v'exists(.Event.EventData.Image)'
      - set:
          action.properties.Image: v'.parsed_message_kv.Image'
        filter: v'!exists(.Event.EventData.Image)'
      - set:
          action.properties.DestinationPort: v'.Event.EventData.DestinationPort'
        filter: v'exists(.Event.EventData.DestinationPort)'
      - set:
          action.properties.DestinationPort: v'.Event.EventData.DestPort'
        filter: v'!exists(.action.properties.DestinationPort)'
      - set:
          action.properties.ErrorCode: v'.Event.EventData.ErrorCode'
        filter: v'exists(.Event.EventData.ErrorCode)'
      - set:
          action.properties.ProcessName: v'.Event.EventData.ProcessName'
        filter: v'exists(.Event.EventData.ProcessName)'
      # - set:
      #     action.properties.Accesses: "v'replace(replace(.network_object.Accesses, \"#NEWLINE#\", \"\\r\\n\"), \"#NEWLINE2#\", \"\\n\")'"
      #   filter: v'exists(.network_object.Accesses)'
      # - set:
      #     action.properties.OperationType: v'.patch_5136.OperationType'
      #   filter: v'exists(.patch_5136.OperationType)'
      # - set:
      #     action.properties.Keywords: "v'to_string!(to_int!(to_string!(.action.properties.Keywords)))'"
      #   filter: "v'exists(.action.properties.Keywords) && !starts_with(to_string!(.action.properties.Keywords), \"0x\")'"
      # - set:
      #     action.properties.TaskContent: v'.Event.EventData.TaskContent'
      #     action.properties.TaskContentNew_Args: v'.parsed_task_content_xml.Task.Actions.Exec.Arguments'
      #     action.properties.TaskContentNew_Command: v'.parsed_task_content_xml.Task.Actions.Exec.Command'
      #   filter: v'.event.id == 4698'
      # - set:
      #     action.properties.HostApplication: "v'replace(replace(.patch_4103.HostApplication, \"#NEWLINE#\", \"\\r\\n\"), \"#NEWLINE2#\", \"\\n\")'"
      #     action.properties.HostName: "v'replace(replace(.patch_4103.HostName, \"#NEWLINE#\", \"\\r\\n\"), \"#NEWLINE2#\", \"\\n\")'"
      #   filter: v'exists(.Event.EventData.ContextInfo) && .event.id == 4103'
      # - set:
      #     action.properties.Content: v'.sysmon_15.Content'
      #     action.properties.HostUrl: v'.sysmon_15.HostUrl'
      #     action.properties.ReferrerUrl: v'.sysmon_15.ReferrerUrl'
      #     action.properties.ZoneId: v'.sysmon_15.ZoneId'
      #   filter: v'exists(.parsed_message_kv.Contents) && .event.id == 15'
      # - set:
      #     action.properties.AdditionalActionsID: v'.Event.EventData.AdditionalActionsID'
      #     action.properties.AdditionalActionsString: v'.Event.EventData.AdditionalActionsString'
      # - set:
      #     action.properties.ProxyServer: v'.parsed_message_xml.AuditBase.ContextComponents.Component.ProxyServer'
      #   filter: v'.Event.System.Provider == "AD FS Auditing"'

  set_destination:
    actions:
      - set:
          destination.ip: v'.Event.EventData.DestinationIp'
      - set:
          destination.ip: v'.Event.EventData.DestAddress'
        filter: v'!exists(.destination.ip)'
      - set:
          destination.port: v'.Event.EventData.DestinationPort'
      - set:
          destination.port: v'.Event.EventData.DestPort'
        filter: v'!exists(.destination.port)'
      - set:
          destination.domain: v'.Event.EventData.DestinationHostname'
      - set:
          destination.domain: v'.url.domain'
        filter: v'exists(.url.domain) && !exists(.destination.domain)'
      - set:
          destination.address: v'.Event.EventData.DestinationAddress'
      - set:
          destination.address: v'.Event.EventData.DestAddress'
        filter: v'!exists(.destination.address)'
      - set:
          destination.address: v'.url.domain'
        filter: v'exists(.url.domain) && !exists(.destination.address)'

  set_dll:
    actions:
      - set:
          dll.path: v'.Event.EventData.ImageLoaded'
      - set:
          dll.name: v'.Event.EventData.OriginalFileName'
      - set:
          dll.pe.imphash: v'.parsed_hashes_kv.IMPHASH'
      - set:
          dll.pe.imphash: v'.parsed_hashes_kv_2.IMPHASH'
        filter: v'!exists(.dll.pe.imphash)'
      - set:
          dll.hash.md5: v'.parsed_hashes_kv.MD5'
      - set:
          dll.hash.md5: v'.parsed_hashes_kv_2.MD5'
        filter: v'!exists(.dll.hash.md5)'
      - set:
          dll.hash.sha256: v'.parsed_hashes_kv.SHA256'
      - set:
          dll.hash.sha256: v'.parsed_hashes_kv_2.SHA256'
        filter: v'!exists(.dll.hash.sha256)'

  main_stage:
    actions:
      - set:
          timestamp: v'.Event.EventData.UtcTime'
          action.type: v'.Event.System.Channel'
          action.id: v'.event.code'
          event.provider: v'.Event.System.Provider."#attributes".Name'
          host.name: v'.Event.System.Computer'
          host.hostname: v'split!(.Event.System.Computer, ".")[0]'
          os.family: "windows"
          os.platform: "windows"
      - set:
          file.name: v'.Event.EventData.name'
      - set:
          process.command_line: v'.Event.EventData.CommandLine'
      - set:
          process.parent.command_line: v'.Event.EventData.ParentCommandLine'
      - set:
          action.record_id: v'.Event.EventData.RecordNumber'
      - set:
          destination.domain: v'.Event.EventData.DestinationHostname'
      - set:
          destination.ip: v'.Event.EventData.DestAddress'
      - set:
          destination.ip: v'.Event.EventData.DestinationIp'
        filter: v'!exists(.destination.ip)'
      - set:
          destination.port: v'.Event.EventData.DestPort'
      - set:
          destination.port: v'.Event.EventData.DestinationPort'
        filter: v'!exists(.destination.port)'
      - set:
          event.reason: v'.Event.EventData.Description'
      - set:
          file.created: v'.Event.EventData.CreationUtcTime'
      - set:
          file.owner: v'.Event.EventData.jobOwner'
      - set:
          log.level: v'.Event.EventData.Severity'
      - set:
          network.transport: v'.Event.EventData.Protocol'
      - set:
          process.executable: v'.Event.EventData.Image'
      - set:
          process.parent.executable: v'.Event.EventData.ParentImage'
      - set:
          process.parent.executable: v'.Event.EventData.ParentProcessName'
        filter: v'!exists(.process.parent.executable)'
      - set:
          process.ppid: v'.Event.EventData.ParentProcessId'
      - set:
          process.thread.id: v'.Event.EventData.ThreadID'
      - set:
          process.working_directory: v'.Event.EventData.CurrentDirectory'
      - set:
          source.domain: v'.Event.EventData.SourceHostname'
      - set:
          source.port: v'.Event.EventData.SourcePort'
      - set:
          url.original: v'.Event.EventData.url'
      - set:
          url.original: v'.Event.EventData.RemoteName'
        filter: v'!exists(.url.original)'
      - set:
          user.id: v'.Event.EventData.SubjectUserSid'
      - set:
          user.id: v'.Event.EventData.UserID'
        filter: v'!exists(.user.id)'
      - set:
          user.target.name: v'.Event.EventData.TargetUserName'
      - set:
          user.target.domain: v'.Event.EventData.TargetDomainName'
      - set:
          user.target.id: v'.Event.EventData.TargetUserSid'
      - set:
          url.domain: v'split!(.Event.EventData.url, r'/')[0]'
        filter: v'exists(.Event.EventData.url) && !starts_with(to_string!(.Event.EventData.url), "http")'
      - set:
          url.domain: v'split!(.Event.EventData.RemoteName, r'/')[0]'
        filter: v'exists(.Event.EventData.RemoteName) && !starts_with(to_string!(.Event.EventData.RemoteName), "http")'
      - set:
          package.name: v'split!(.Event.EventData.LmPackageName, " ")[0]'
          package.description: "LAN Manager package"
        filter: v'exists(.Event.EventData.LmPackageName) && .Event.EventData.LmPackageName != "-"'
      - set:
          package.version: v'split!(.Event.EventData.LmPackageName, " ")[-1]'
        filter: v'exists(.Event.EventData.LmPackageName) && length(split!(.Event.EventData.LmPackageName, " ")) > 1'
      - set:
          process.name: v'split!(.Event.EventData.Application, "\\")[-1]'
        filter: v'exists(.Event.EventData.Application)'

  finalize:
    actions:
      - set:
          log.level: v'downcase!(string!(.log.level))'
        filter: v'exists(.log.level)'
      - set:
          process.command_line: v'replace!(.process.command_line, "\"", "")'
        filter: v'exists(.process.command_line)'
      - set:
          process.parent.command_line: v'replace!(.process.parent.command_line, "\"", "")'
        filter: v'exists(.process.parent.command_line)'
      - set:
          process.pe.imphash: v'downcase!(string!(.process.pe.imphash))'
        filter: v'exists(.process.pe.imphash)'
      - set:
          process.hash.md5: v'downcase!(string!(.process.hash.md5))'
        filter: v'exists(.process.hash.md5)'
      - set:
          process.hash.sha1: v'downcase!(string!(.process.hash.sha1))'
        filter: v'exists(.process.hash.sha1)'
      - set:
          process.hash.sha256: v'downcase!(string!(.process.hash.sha256))'
        filter: v'exists(.process.hash.sha256)'
      - set:
          file.pe.imphash: v'downcase!(string!(.file.pe.imphash))'
        filter: v'exists(.file.pe.imphash)'
      - set:
          file.hash.md5: v'downcase!(string!(.file.hash.md5))'
        filter: v'exists(.file.hash.md5)'
      - set:
          file.hash.sha256: v'downcase!(string!(.file.hash.sha256))'
        filter: v'exists(.file.hash.sha256)'
      - set:
          dll.hash.imphash: v'downcase!(string!(.dll.pe.imphash))'
        filter: v'exists(.dll.pe.imphash)'
      - set:
          dll.pe.imphash: v'downcase!(string!(.dll.pe.imphash))'
        filter: v'exists(.dll.pe.imphash)'
      - set:
          dll.hash.md5: v'downcase!(string!(.dll.hash.md5))'
        filter: v'exists(.dll.hash.md5)'
      - set:
          dll.hash.sha256: v'downcase!(string!(.dll.hash.sha256))'
        filter: v'exists(.dll.hash.sha256)'
      - set:
          process.parent.command_line: v'.process.parent.executable'
        filter: v'exists(.process.parent.command_line) && exists(.process.parent.executable) && downcase!(string!(.process.parent.command_line)) == downcase!(string!(.process.parent.executable))'
      - set:
          source.size_in_char: v'length(string!(.source.domain))'
        filter: v'exists(.source.domain)'
      - set:
          destination.size_in_char: v'length(string!(.destination.domain))'
        filter: v'exists(.destination.domain)'
      - set:
          process.name: v'basename!(.process.executable)'
        filter: v'exists(.process.executable) && !exists(.process.name)'
      - set:
          process.working_directory: v'dirname!(.process.executable) + "\\"'
        filter: v'exists(.process.executable) && !exists(.process.working_directory)'
      - set:
          process.parent.name: v'basename!(.process.parent.executable)'
        filter: v'exists(.process.parent.executable) && !exists(.process.parent.name)'
      - set:
          process.parent.working_directory: v'dirname!(.process.parent.executable) + "\\"'
        filter: v'exists(.process.parent.executable) && !exists(.process.parent.working_directory)'
      - set:
          process.name: "powershell.exe"
        filter: v'.Event.System.Provider == "Microsoft-Windows-PowerShell"'
      - set:
          file.size: "-1"
        filter: v'exists(.Event.EventData.fileLength) && .Event.EventData.fileLength == "18446744073709551615"'

  dns_fields:
    actions:
      - set:
          dns.question.name: v'.Event.EventData.QueryName'
      - set:
          dns.response_code: v'.Event.EventData.QueryStatus'
      - set:
          dns.type: "query"
        filter: v'exists(.Event.EventData.QueryName)'
      - set:
          dns.type: "answer"
        filter: v'exists(.Event.EventData.QueryResults)'
      - set:
          dns.size_in_char: v'length(string!(.dns.question.name))'
        filter: v'exists(.dns.question.name)'

  registry:
    actions:
      - set:
          registry.value: v'.Event.EventData.Details'
      - set:
          registry.path: v'.Event.EventData.TargetObject'
          registry.hive: v'split!(.Event.EventData.TargetObject, "\\")[0]'
          registry.key: v'join!(slice!(split!(.Event.EventData.TargetObject, "\\"), 1, -1), "\\")'
          registry.value: v'split!(.Event.EventData.TargetObject, "\\")[-1]'
        filter: v'exists(.Event.EventData.TargetObject)'
      - set:
          registry.data.type: "STRING"
          registry.data.strings: v'[string!(.Event.EventData.Details)]'
        filter: v'exists(.Event.EventData.Details) && starts_with(to_string!(.Event.EventData.Details), "\"")'
      - set:
          registry.data.type: v'split!(to_string!(.Event.EventData.Details), " ")[0]'
          # registry.data.strings: "v'[to_string!(parse_int!(replace!(replace!(split!(to_string!(.Event.EventData.Details), " ")[-1], r'(', ""), r')', ""), base: 16))]'"
        filter: v'exists(.Event.EventData.Details) && ends_with(to_string!(.Event.EventData.Details), ")")'
      - translate:
          mapping:
            registry.data.type: registry.data.type
          dictionary:
            DWORD: "REG_DWORD"
            STRING: "REG_SZ"
          fallback: "REG_NONE"
        filter: v'exists(.registry.data.type)'

  set_url:
    actions:
      - set:
          url.full: v'.url.original'
          url.domain: v'.parse_url.domain'
          url.scheme: v'.parse_url.scheme'
          url.path: v'.parse_url.path'
        filter: v'exists(.url.original) && starts_with(to_string!(.url.original), "http")'

  network_type:
    actions:
      - set:
          network.type: "ipv6"
        filter: v'.Event.EventData.SourceIsIpv6 == "true"'
      - set:
          network.type: "ipv4"
        filter: v'.Event.EventData.SourceIsIpv6 == "false"'

  hashes:
    actions:
      - set:
          process.pe.imphash: v'.parsed_hashes_kv.IMPHASH'
        filter: v'!includes([7, 15, 23, 24, 26], .event.id)'
      - set:
          process.pe.imphash: v'.parsed_hashes_kv_2.IMPHASH'
        filter: v'!includes([7, 15, 23, 24, 26], .event.id) && !exists(.process.pe.imphash)'
      - set:
          process.hash.sha1: v'.parsed_hashes_kv.SHA1'
        filter: v'!includes([7, 15, 23, 24, 26], .event.id)'
      - set:
          process.hash.sha1: v'.parsed_hashes_kv_2.SHA1'
        filter: v'!includes([7, 15, 23, 24, 26], .event.id) && !exists(.process.hash.sha1)'
      - set:
          process.hash.md5: v'.parsed_hashes_kv.MD5'
        filter: v'!includes([7, 15, 23, 24, 26], .event.id)'
      - set:
          process.hash.md5: v'.parsed_hashes_kv_2.MD5'
        filter: v'!includes([7, 15, 23, 24, 26], .event.id) && !exists(.process.hash.md5)'
      - set:
          process.hash.sha256: v'.parsed_hashes_kv.SHA256'
        filter: v'!includes([7, 15, 23, 24, 26], .event.id)'
      - set:
          process.hash.sha256: v'.parsed_hashes_kv_2.SHA256'
        filter: v'!includes([7, 15, 23, 24, 26], .event.id) && !exists(.process.hash.sha256)'

  process_ids:
    actions:
      - set:
          process.pid: v'.Event.EventData.ProcessID'
      - set:
          process.pid: v'.Event.EventData.ProcessId'
        filter: v'.Event.System.Provider == "Microsoft-Windows-Sysmon" && includes([1,2,3,5,7,9,11,12,13,14,15,17,18,22,25,26], .event.id)'
      # - set:
      #     process.pid: v'to_int!(parse_int!(to_string!(.Event.EventData.NewProcessId), base: 16))'
      #   filter: v'.Event.System.Provider == "Microsoft-Windows-Security-Auditing" && includes([4688, 4689], .event.id) && exists(.Event.EventData.NewProcessId)'
      # - set:
      #     process.parent.pid: v'to_int!(parse_int!(to_string!(.Event.EventData.CreatorProcessId), base: 16))'
      #   filter: v'.Event.System.Provider == "Microsoft-Windows-Security-Auditing" && includes([4688, 4689], .event.id) && exists(.Event.EventData.CreatorProcessId)'
      - set:
          process.pid: v'.Event.EventData.SourceProcessId'
        filter: v'.Event.System.Provider == "Microsoft-Windows-Sysmon" && includes([8, 10], .event.id)'
      - set:
          process.id: v'.process.pid'
        filter: v'exists(.process.pid)'
      - set:
          process.thread.id: v'.Event.EventData.ThreadID'

  set_user:
    actions:
      - set:
          user.name: v'.Event.EventData.User'
      - set:
          user.name: v'.Event.EventData.AccountName'
        filter: v'!exists(.user.name)'
      - set:
          user.name: v'.Event.EventData.Requester'
        filter: v'!exists(.user.name)'
      - set:
          user.domain: v'split!(.user.name, "\\")[0]'
          user.name: v'split!(.user.name, "\\")[1]'
        filter: v'exists(.user.name) && contains(to_string!(.user.name), "\\")'
      - set:
          user.domain: v'.Event.EventData.Domain'
        filter: v'exists(.user.name) && !exists(.user.domain)'
      - set:
          user.domain: v'.Event.System.Computer'
        filter: v'exists(.user.name) && !exists(.user.domain)'
      - set:
          user.name: v'.Event.EventData.SubjectUserName'
          user.domain: v'.Event.EventData.SubjectDomainName'
        filter: v'!exists(.user.name)'

  action_target:
    actions:
      - set:
          action.target: "network-traffic"
        filter: v'exists(.source) && exists(.destination) && exists(.action)'
      - set:
          action.target: "registry"
        filter: v'exists(.registry) && exists(.action)'

  set_file:
    actions:
      - set:
          file.path: v'.Event.EventData.LocalName'
          file.name: v'basename!(.Event.EventData.LocalName)'
        filter: v'exists(.Event.EventData.LocalName)'
      - set:
          file.path: v'.Event.EventData.TargetFilename'
          file.name: v'basename!(.Event.EventData.TargetFilename)'
        filter: v'!exists(.file.path)'
      - set:
          file.owner: v'.Event.EventData.jobOwner'
      - set:
          file.created: v'to_string!(.Event.EventData.CreationUtcTime)'
        filter: v'exists(.Event.EventData.CreationUtcTime)'
      - set:
          file.size: v'.Event.EventData.fileLength'
      - set:
          file.name: v'basename!(.Event.EventData.name)'
          file.path: v'.Event.EventData.name'
        filter: v'.Event.System.Provider == "Microsoft-Windows-Bits-Client" && includes([59, 60], .event.id)'
      - set:
          file.name: v'basename!(.Event.EventData.ObjectName)'
          file.path: v'.Event.EventData.ObjectName'
        filter: v'.Event.System.Provider == "Microsoft-Windows-Security-Auditing" && .event.id == 4663 && includes(["File", "Process"], .Event.EventData.ObjectType)'
      - set:
          file.name: v'basename!(.Event.EventData.script.name)'
          file.path: v'.Event.EventData.script.name'
        filter: v'.Event.System.Provider == "Microsoft-Windows-PowerShell" && exists(.Event.EventData.script.name)'
      - set:
          file.pe.imphash: v'.parsed_hashes_kv.IMPHASH'
        filter: v'includes([15, 23, 24, 26, 28], .event.id)'
      - set:
          file.pe.imphash: v'.parsed_hashes_kv_2.IMPHASH'
        filter: v'includes([15, 23, 24, 26, 28], .event.id) && !exists(.file.pe.imphash)'
      - set:
          file.hash.md5: v'.parsed_hashes_kv.MD5'
        filter: v'includes([15, 23, 24, 26, 28], .event.id)'
      - set:
          file.hash.md5: v'.parsed_hashes_kv_2.MD5'
        filter: v'includes([15, 23, 24, 26, 28], .event.id) && !exists(.file.hash.md5)'
      - set:
          file.hash.sha256: v'.parsed_hashes_kv.SHA256'
        filter: v'includes([15, 23, 24, 26, 28], .event.id)'
      - set:
          file.hash.sha256: v'.parsed_hashes_kv_2.SHA256'
        filter: v'includes([15, 23, 24, 26, 28], .event.id) && !exists(.file.hash.sha256)'
      - set:
          file.name: v'split!(split!(.Event.EventData.Message, " ")[0], "\\")[-1]'
          file.path: v'split!(.Event.EventData.Message, " ")[0]'
        filter: v'includes([8002, 8005], .event.id) && exists(.Event.EventData.Message)'

  process_parent_executable:
    actions:
      - set:
          process.parent.executable: v'.Event.EventData.ParentImage'
      - set:
          process.parent.executable: v'.Event.EventData.ParentProcessName'
        filter: v'!exists(.process.parent.executable)'

  process_executable:
    actions:
      - set:
          process.executable: v'.Event.EventData.NewProcessName'
        filter: v'.Event.System.Provider == "Microsoft-Windows-Security-Auditing" && includes([4688, 4689], .event.id)'
      - set:
          process.executable: v'.Event.EventData.ProcessName'
        filter: v'.Event.System.Provider == "Microsoft-Windows-Security-Auditing" && includes([4656, 4657, 4658, 4663, 4670, 4674], .event.id)'
      - set:
          process.executable: v'.Event.EventData.ImageLoaded'
        filter: v'.Event.System.Provider == "Microsoft-Windows-Sysmon" && .event.id == 6'
      - set:
          process.executable: v'.Event.EventData.SourceImage'
        filter: v'.Event.System.Provider == "Microsoft-Windows-Sysmon" && includes([8, 10], .event.id)'
      - set:
          process.executable: v'.Event.EventData.ProcessName'
        filter: v'!exists(.process.executable)'

  action_outcome:
    actions:
      - set:
          action.outcome: "success"
        filter: v'.Event.EventData.EventType == "AUDIT_SUCCESS"'
      - set:
          action.outcome: "failure"
        filter: v'.Event.EventData.EventType == "AUDIT_FAILURE"'

  event_outcome:
    actions:
      - set:
          event.outcome: "success"
        filter: v'.event.code == 4624'
      - set:
          event.outcome: "failure"
        filter: v'.event.code == 4625'

  set_source_fields:
    actions:
      - set:
          source.ip: v'.Event.EventData.SourceIp'
        filter: v'is_ipv4(to_string!(.Event.EventData.SourceIp)) || is_ipv6(to_string!(.Event.EventData.SourceIp))'
      - set:
          source.ip: v'.Event.EventData.SourceAddress'
        filter: v'!exists(.source.ip) && (is_ipv4(to_string!(.Event.EventData.SourceAddress)) || is_ipv6(to_string!(.Event.EventData.SourceAddress)))'
      # - set:
      #     source.ip: v'strip_suffix(split!(to_string!(.Event.EventData.Message), "Client IP: ")[-1], ".")'
      #   filter: v'.event.code == 56 && exists(.Event.EventData.Message)'
      - set:
          source.address: v'remove_prefix(to_string!(.Event.EventData.SourceIp), "::ffff:")'
        filter: v'is_ipv4(to_string!(.Event.EventData.SourceIp)) || is_ipv6(to_string!(.Event.EventData.SourceIp))'
      - set:
          source.address: v'remove_prefix(to_string!(.Event.EventData.IpAddress), "::ffff:")'
        filter: v'is_ipv4(to_string!(.Event.EventData.IpAddress)) || is_ipv6(to_string!(.Event.EventData.IpAddress))'
      - set:
          source.address: v'remove_prefix(to_string!(.Event.EventData.SourceHostname), "::ffff:")'
        filter: v'is_ipv4(to_string!(.Event.EventData.SourceHostname)) || is_ipv6(to_string!(.Event.EventData.SourceHostname))'
      - set:
          source.address: v'remove_prefix(to_string!(.Event.EventData.SourceAddr), "::ffff:")'
        filter: v'is_ipv4(to_string!(.Event.EventData.SourceAddr)) || is_ipv6(to_string!(.Event.EventData.SourceAddr))'

  set_network_policy_fields:
    actions:
      - set:
          source.ip: v'.Event.EventData.CallingStationID'
        filter: v'is_ipv4(to_string!(.Event.EventData.CallingStationID)) || is_ipv6(to_string!(.Event.EventData.CallingStationID))'
      - set:
          source.mac: v'.Event.EventData.CallingStationID'
        filter: v'!exists(.source.ip)'
      - set:
          destination.ip: v'.Event.EventData.AuthenticationServer'
        filter: v'is_ipv4(to_string!(.Event.EventData.AuthenticationServer)) || is_ipv6(to_string!(.Event.EventData.AuthenticationServer))'
      - set:
          destination.domain: v'.Event.EventData.AuthenticationServer'
        filter: v'!exists(.destination.ip)'

  rule:
    actions:
      - set:
          rule.name: v'.Event.EventData.RuleName'

  set_event:
    actions:
      - set:
          event.code: v'to_int!(.Event.System.EventID."#text")'
      - set:
          event.code: v'to_int!(.Event.System.EventID)'
        filter: v'!exists!(.event.code)'
      - set:
          event.record: v'to_string!(.Event.System.EventRecordID)'
          event.id: v'.event.code'

  set_action:
    actions:
      - set:
          action.type: v'to_string!(.Event.System.Channel)'

