metadata:
  version: "2.0"
  author: Typ
  description: Splunk logs ingestion of Mongodb logs.
  os: generic

configuration:
  module: indexer-ng
  type: post_parsing
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: unix

tool: 
  path: json2splunk-rs
  cmd: >-
    --input {input_file} --input_type jsonl --index {case_name} --config_spl /OSIR/setup/conf/agent.yml 
    --indexer_patterns /OSIR/OSIR/configs/modules/splunk/mongodb.yml --vrl_dir /OSIR/OSIR/configs/dependencies/
  source: https://github.com/maxspl/json2splunk-rs/releases
  version: 1.3

input:
  type: file
  paths: 
    - "**/var/log/mongodb/*.log"
    - r"^mongod.log$"

output:
  type: None

splunk:
  'linux:app:mongodb':
    name_rex: mongod.log$
    sourcetype: 'linux:app:mongodb'
    host_rex: "extract_uac\/(.*?)\/"
    artifact: "mongodb"
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    normalize:
      - ecs_normalize/linux/mongodb.vrl