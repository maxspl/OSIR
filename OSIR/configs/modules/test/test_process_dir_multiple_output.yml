metadata:
  version: "2.0"
  author: maxspl
  description: test_process_dir_multiple_output
  os: windows

configuration:
  module: test_process_dir_multiple_output
  type: process
  disk_only: true
  no_multithread: true
  processor_type:
  - external
  processor_os: unix

tool: 
  path: process_dir_multiple_output
  cmd: -d {input_dir} -o {output_dir}
  source: 
  version: 1.0

input:
  type: dir
  path: extracted_files/Powershell

output:
  type: multiple_files
  format: jsonl
  output_prefix: "{endpoint_name}--{module}-"

endpoint: 
  patterns:
    - r"/Endpoint_(.*?)/"
  default: "UNKNOWN"
