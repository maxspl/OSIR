metadata:
  version: "2.0"
  author: Typ
  description: Parsing logs from '/var/log/utmp|btmp|wtmp'
  os: unix

configuration:
  module: utmp
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - internal
  processor_os: unix

input:
  type: file
  name: (?:utmp|btmp|wtmp)
  path: var/log

output:
  type: single_file
  format: json
  output_file: "{endpoint_name}--{module}-{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:utmp':
    name_rex: ^(utmp|btmp|wtmp)(\.\d+)?.*?\.jsonl$
    sourcetype: 'linux:utmp'
    host_rex: "\/Endpoint_(.*?)\/"
    timestamp_path: 
        - "tv_sec"
    timestamp_format: "%Y/%m/%d %H:%M:%S"
    artifact: "utmp"