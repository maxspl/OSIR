metadata:
  version: "2.0"
  author: Typ
  description: Parsing logs from '/var/log/boot'
  os: unix

configuration:
  module: boot
  type: process
  disk_only: true
  no_multithread: true
  processor_type:
  - internal
  processor_os: unix

input:
  type: file
  name: (?:boot.log)
  path: var/log

output:
  type: single_file
  format: json
  output_file: "{endpoint_name}--{module}-{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:boot':
    name_rex: boot.*\.jsonl$
    sourcetype: 'linux:boot'
    host_rex: "\/Endpoint_(.*?)\/"
    artifact: "boot"