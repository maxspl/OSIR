version: 1.1
author: Kelly Brazil
module: arp
description: Kelly Brazil - JsonConverter - Parsing the output of the command arp or arp -a
os: unix
type: process
requirements:
disk_only: false
no_multithread: false
processor_type: 
  - external
processor_os: unix
tool: 
  path: cat
  cmd: "{input_file} | jc --arp | jq -c '.[]' > {output_file}"
input:
  type: file
  paths:
    - r"arp\.txt$"
    - r"arp_-a\.txt$"
output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/network"
  output_file: "{endpoint_name}--{input_file}.jsonl"
endpoint: "extract_uac\/(.*?)\/"
splunk:
  'linux:live_response:network:arp':
    name_rex: arp\.jsonl$
    path_suffix: arp
    sourcetype: 'linux:live_response:network:arp'
    host_rex: _([\w\.-]+)--
    artifact: "arp"