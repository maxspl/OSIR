metadata:
  version: "2.0"
  author: Typ
  description: Parse cronjobs using dissect plugin
  os: unix

configuration:
  module: cronjobs
  alt_module: dissect_dispatcher
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - internal
  processor_os: unix

input:
  type: dir
  paths:
    - r"extract_uac.*\/\[root\]$"

output:
  type: single_file
  format: jsonl
  output_file: "{endpoint_name}--{module}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/Endpoint_(.*?)\/"
  default: "UNKNOWN"

optional:
  plugin: cronjobs

splunk:
  'linux:cronjobs':
    name_rex: \.jsonl$
    sourcetype: 'linux:cronjobs'
    host_rex: ([\w\.-]+)--
    timestamp_path: 
        - "ts"
    timestamp_format: "%Y-%m-%dT%H:%M:%S.%f%z"
    artifact: "cronjobs"
