metadata:
  version: "2.0"
  author: maxspl
  description: Update Thor signature files using thor-util.
  os: generic

configuration:
  module: thor_update
  type: post_parsing
  disk_only: false
  no_multithread: true
  processor_type:
  - external
  processor_os: unix

tool: 
  path: thor/thor-util
  cmd: update --sigdev
  source: https://www.nextron-systems.com/thor/
  version: 1.0

input:
  type: dir
  path: "{case_path}"

output:
  type: single_file
  format: raw