metadata:
  version: "2.0"
  author: Kelly Brazil
  description: Kelly Brazil - JsonConverter - Parsing the output of the command blkid
  os: unix

configuration:
  module: blkid
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: unix

tool: 
  path: cat
  cmd: "{input_file} | jc --blkid | jq -c '.[]'> {m_output_file}"

input:
  type: file
  paths: 
    - r"blkid\.txt$"

output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/storage"
  output_file: "{endpoint_name}--{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:live_response:storage:blkid':
    name_rex: \.jsonl$
    path_suffix: blkid
    sourcetype: 'linux:live_response:storage:blkid'
    host_rex: _([\w\.-]+)--
    artifact: blkid