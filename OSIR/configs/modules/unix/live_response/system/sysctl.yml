version: 1.0
author: Kelly Brazil
module: sysctl
description: Kelly Brazil - JsonConverter - Parsing the output of the command sysctl -a 
os: unix
type: process
requirements:
disk_only: false
no_multithread: false
processor_type: 
  - external
processor_os: unix
tool: 
  path: cat
  cmd: "{input_file} | jc --sysctl > {output_file}"
input:
  type: file
  paths:
    - r"sysctl\.txt$"
    - r"sysctl_-a\.txt$"
output:
  type: single_file
  format: jsonl
  output_dir: "{case_path}/live_response/system"
  output_file: "{endpoint_name}--{input_file}.jsonl"
endpoint: "extract_uac\/(.*?)\/"
splunk:
  'linux:live_response:sysctl':
    name_rex: \.jsonl$
    path_suffix: sysctl
    sourcetype: _json
    host_rex: _([\w\.-]+)--
    artifact: sysctl