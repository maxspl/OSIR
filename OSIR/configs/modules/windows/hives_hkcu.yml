version: 1.0
author: maxspl
module: hives_hkcu
description: Parsing of registry hives artifact.
os: windows
type: process
disk_only: False
no_multithread: False
processor_type: 
  - external
processor_os: windows
tool: 
  path: net9/RECmd/RECmd.exe
  cmd: -d "{input_dir}" --csv "{output_dir}" --csvf "{output_file}" --bn "{drive}\OSIR\bin\net9\RECmd\BatchExamples\DFIRBatch.reb" --recover
  source: https://ericzimmerman.github.io/
  version: 2.1
input:
  type: dir
  path: r"restore_fs\/[^\/]*\/\w?\/?Users$"
output:
  type: single_file
  format: csv
  output_file: "{endpoint_name}--{module}.csv"
endpoint: "restore_fs\/(.*?)\/"
splunk:
  'windows:hkcu':
    name_rex: --hives_*\w*\.csv
    path_rex: '.*\/hives_hkcu.*'
    sourcetype: 'windows:registry:kcu'
    host_rex: ([\w\.-]+)--
    artifact: "Hives"
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    normalize:
      - ecs_normalize/windows/hives.vrl               