metadata:
  version: "1.0"
  author: maxspl
  description: Parsing of EVTX collected by DFIR ORC or in the filesystem - using ANSSI DFIR OGRE
  os: windows

configuration:
  module: ogre-evtx
  type: process
  disk_only: false
  no_multithread: false
  processor_type:
  - external
  processor_os: unix

tool: 
  path: /app/ogre-venv/bin/dfir-ogre
  cmd: >-
    plugin
    --filename "{input_file}"
    --computer_name "{endpoint_name}"
    --output_folder "{output_dir}"
    --plugin_config "/ogre/dfir-ogre-plugin-windows/configuration/evtx.xml"
  source: https://github.com/ANSSI-FR/dfir-ogre
  version: 2.0.0-beta1

input:
  type: file
  paths:
    - r"_[\w%-]+\.evtx_{"
    - r"\.evtx$"

output:
  type: multiple_files
  format: jsonl
  output_prefix: "{endpoint_name}--{module}-"

endpoint: 
  patterns:
    - r"restore_fs\/(.*?)\/"
    - r"\/Endpoint_(.*?)\/"
  default: "UNKNOWN"

splunk:
  'windows:ogre:evtx':
    name_rex: '\.jsonl$'
    path_suffix: 'ogre-evtx'
    sourcetype: 'windows:ogre:evtx'
    host_rex: ([\w\.-]+)--
    artifact: "EVTX"
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%S.%f%z"
