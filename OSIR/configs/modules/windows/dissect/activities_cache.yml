version: 1.0
author: maxspl
module: activities_cache
alt_module: dissect_dispatcher
description: Parse ActivitiesCache.dn from DFIR ORC restore_fs using Dissect plugin
os: windows
type: process
disk_only: False
no_multithread: False
processor_type: 
  - internal
processor_os: unix
input:
  type: dir
  name: arp_cache.txt
  path: r"restore_fs\/[^\/]*$"
output:
  type: single_file
  format: jsonl
  output_file: "{endpoint_name}--{module}.jsonl"
endpoint: "restore_fs\/(.*?)$"
optional:
  plugin: activitiescache