metadata:
  version: "2.0"
  author: Typ
  description: Parsing logs from Zeek
  os: unix

configuration:
  module: zeek_log
  type: process
  disk_only: true
  no_multithread: true
  processor_type:
  - internal
  processor_os: unix

input:
  type: file
  paths:
    - r"conn\.log$"

output:
  type: single_file
  format: json
  output_file: "{endpoint_name}--{input_file}.jsonl"

endpoint: 
  patterns:
    - r"extract_uac\/(.*?)\/"
  default: "UNKNOWN"

splunk:
  'linux:network:zeek':
    name_rex: \.jsonl$
    sourcetype: 'linux:network:zeek'
    host_rex: "\/Endpoint_(.*?)\/"
    timestamp_path: 
        - "_time"
    timestamp_format: "%s"
    artifact: "audit"