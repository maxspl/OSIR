metadata:
  version: "1.0"
  author: maxspl
  description: Scan of collected file using Thor Lite.
  os: generic

configuration:
  module: thor_lite_orc
  type: process
  disk_only: false
  no_multithread: true
  processor_type:
  - external
  processor_os: unix

tool: 
  path: thor-lite/thor-lite-linux-64
  cmd: -a Filescan --intense --norescontrol --cross-platform -p {input_dir} --nocsv --silent --nolog --jsonfile {output_file} --threads 4
  source: https://www.nextron-systems.com/thor-lite/
  version: 1.0

input:
  type: dir
  paths: 
    - "restore_fs/*"

output:
  type: single_file
  format: json
  output_file: "{endpoint_name}--{module}.jsonl"

endpoint: 
  patterns:
  - r"restore_fs\/(.*)"
  default: "UNKNOWN"

splunk:
  'thor:files':
    name_rex: \.jsonl$
    path_suffix: 'thor_lite_orc'
    sourcetype: 'thor:files'
    host_rex: ([\w\.-]+)--
    timestamp_path:
      - "timestamp" 
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    artifact: "Thor"
    normalize:
      - ecs_normalize/scan/thor.vrl